AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    MemorySize: 128
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'
  WfcbBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["7-1"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait_for_callback.wait_for_callback_basic.handler
      Description: Wait-for-callback basic (success via external callback)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  WfcbExplicitName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["7-2"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait_for_callback.wait_for_callback_explicit_name.handler
      Description: Wait-for-callback with explicit static name
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  WfcbAnonymous:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["7-3"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait_for_callback.wait_for_callback_anonymous.handler
      Description: Wait-for-callback with anonymous submitter (no name)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  WfcbExternalFailure:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["7-4"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait_for_callback.wait_for_callback_external_failure.handler
      Description: Wait-for-callback external failure (uncaught)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
