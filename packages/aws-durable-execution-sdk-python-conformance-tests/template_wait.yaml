AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    MemorySize: 128
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'
  WaitBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["2-1"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait.wait_basic.handler
      Description: Wait basic
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  WaitWithName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["2-2"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait.wait_with_name.handler
      Description: Wait with explicit name parameter
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  WaitMultipleSequential:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["2-3"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait.wait_multiple_sequential.handler
      Description: Multiple sequential waits
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  WaitDurationUnits:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["2-4"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait.wait_duration_units.handler
      Description: Wait with different duration units (minutes)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 3700
  WaitLongDuration:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["2-5"]
    Properties:
      CodeUri: lambda-build/
      Handler: wait.wait_long_duration.handler
      Description: Wait with long duration (1 hour)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 7200
