AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    MemorySize: 128
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            - lambda:SendDurableExecutionCallbackSuccess
            - lambda:SendDurableExecutionCallbackFailure
            - lambda:SendDurableExecutionCallbackHeartbeat
            Resource: '*'
  CallbackBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["4-1"]
    Properties:
      CodeUri: lambda-build/
      Handler: callback.callback_basic.handler
      Description: Callback basic - anonymous, success
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  CallbackWithName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["4-2"]
    Properties:
      CodeUri: lambda-build/
      Handler: callback.callback_with_name.handler
      Description: Callback with explicit name
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  CallbackTimeout:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["4-3"]
    Properties:
      CodeUri: lambda-build/
      Handler: callback.callback_timeout.handler
      Description: Callback general timeout
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  CallbackHeartbeatTimeout:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["4-4"]
    Properties:
      CodeUri: lambda-build/
      Handler: callback.callback_heartbeat_timeout.handler
      Description: Callback heartbeat timeout
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  CallbackHeartbeatSuccess:
