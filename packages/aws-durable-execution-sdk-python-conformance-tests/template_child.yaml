AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    MemorySize: 128
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'
      - PolicyName: DynamoDBPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            Resource:
              Fn::GetAtt:
              - AttemptsTable
              - Arn
  AttemptsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
      - AttributeName: executionId
        AttributeType: S
      KeySchema:
      - AttributeName: executionId
        KeyType: HASH
      BillingMode: PAY_PER_REQUEST
  ChildBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-1"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_basic.handler
      Description: Child context basic (single step inside)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildWithName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-2"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_with_name.handler
      Description: Child context with name
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildMultipleSteps:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-3"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_multiple_steps.handler
      Description: Child context with multiple sequential steps
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildError:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-4"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_error.handler
      Description: Child context error (step fails, execution fails)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildErrorCaught:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-5"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_error_caught.handler
      Description: Child context error caught (try/catch, execution succeeds)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildNested:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-6"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_nested.handler
      Description: Nested child contexts
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildRetry:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-7"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_retry.handler
      Description: Child context with step retry (fails then succeeds)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildRetryExhaustion:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-8"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_retry_exhaustion.handler
      Description: Child context with step retry exhaustion (child fails)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildReplay:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-9"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_replay.handler
      Description: Child context replay (returns cached result)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildStepAndWait:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-10"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_step_and_wait.handler
      Description: Child context with step and wait inside
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildLargePayload:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-11"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_large_payload.handler
      Description: Child context large payload (ReplayChildren mode)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildInterrupted:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-12"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_interrupted.handler
      Description: Child context interrupted and re-executed
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
      Environment:
        Variables:
          ATTEMPTS_TABLE_NAME:
            Ref: AttemptsTable
  ChildWaitReplay:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-13"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_wait_replay.handler
      Description: Child context with wait inside - verify replay
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildErrorNoStep:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-15"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_error_no_step.handler
      Description: Child context error without step (error thrown directly in child body)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildNullResult:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-16"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_null_result.handler
      Description: Child context returning null
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildPrintOnly:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-17"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_print_only.handler
      Description: Child context with print only (verify no re-execution on replay)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ChildStepWaitAfter:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["3-18"]
    Properties:
      CodeUri: lambda-build/
      Handler: child.child_step_wait_after.handler
      Description: Child context with step and wait inside, step and wait after
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
