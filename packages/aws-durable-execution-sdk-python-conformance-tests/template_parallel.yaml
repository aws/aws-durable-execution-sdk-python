AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    MemorySize: 128
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'
  ParallelBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-1"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_basic.handler
      Description: Parallel basic (two branches, each a single step, all succeed)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelBranchesOnly:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-2"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_branches_only.handler
      Description: Parallel invoked with the branches-only form (no name argument)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelNamed:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-3"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_named_branches.handler
      Description: Parallel invoked with named-branch objects (a name plus a function)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelHetero:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-4"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_heterogeneous.handler
      Description: Parallel whose branches return different types (string, number, object)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelEmpty:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-5"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_empty.handler
      Description: Parallel invoked with an empty branches list completes immediately
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelFailFast:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-6"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_fail_fast.handler
      Description: Parallel with a fail-fast completion config (tolerated-failure-count=0) stops on
        the first branch failure
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelThrowIfError:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-7"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_throw_if_error.handler
      Description: Parallel where the handler rethrows, propagating a branch failure
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelMinSuccessful:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-8"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_min_successful.handler
      Description: Parallel with a min-successful completion config stops early
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelTolerated:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-9"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_tolerated_within.handler
      Description: Parallel tolerating one failure completes all branches
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelToleratedExceeded:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-10"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_tolerated_exceeded.handler
      Description: Parallel stops early once the failure count exceeds the tolerated-failure-count
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelConcurrent:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-11"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_concurrent.handler
      Description: Parallel executing branches concurrently returns index-ordered results
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelFlat:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-12"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_flat.handler
      Description: Parallel with FLAT nesting executes branches in virtual contexts
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelToleratedPct:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-13"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_tolerated_pct.handler
      Description: Parallel stops early once the failure percentage exceeds the tolerated-failure-percentage
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelReplay:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-14"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_replay_skips_succeeded.handler
      Description: Parallel replay skips succeeded branches across a wait suspension
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelCustomSerde:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-15"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_custom_serde.handler
      Description: Parallel with a custom per-branch serde (item_serdes)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelAllFail:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-16"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_all_fail.handler
      Description: Parallel where all branches fail (within tolerance)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelMinNotReached:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-17"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_min_not_reached.handler
      Description: Parallel min-successful not reached (all branches run)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelCombinedConfig:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-18"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_combined_config.handler
      Description: Parallel combined completion config (min-successful + tolerated-failure-count)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelBadConcurrency:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-19"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_bad_concurrency.handler
      Description: Parallel with invalid max-concurrency raises a validation error
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelAccessors:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-20"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_accessors.handler
      Description: Parallel BatchResult accessors (succeeded/failed/get_errors/has_failure)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelNested:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-21"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_nested.handler
      Description: Nested parallel (parallel inside a parallel branch)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  ParallelPctBoundary:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["8-22"]
    Properties:
      CodeUri: lambda-build/
      Handler: parallel.parallel_pct_boundary.handler
      Description: Parallel tolerated-failure-percentage at the boundary
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
