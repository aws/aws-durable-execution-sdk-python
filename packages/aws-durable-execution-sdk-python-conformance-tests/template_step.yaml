AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Globals:
  Function:
    Runtime: python3.13
    Timeout: 60
    MemorySize: 128
Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
      - PolicyName: DurableExecutionPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - lambda:CheckpointDurableExecution
            - lambda:GetDurableExecutionState
            Resource: '*'
  StepBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-1"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_basic.handler
      Description: Step basic (succeeds on first attempt)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepWithName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-2"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_with_name.handler
      Description: Step with explicit name parameter
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepNested:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-3"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_nested.handler
      Description: Sequential steps where second depends on first
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepComplexObject:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-4"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_complex_object.handler
      Description: Returning complex object with nested structure
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepNullResult:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-5"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_null_result.handler
      Description: Undefined/null result
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepCustomSerdes:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-6"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_custom_serdes.handler
      Description: Custom serdes (per-step) transforms to uppercase
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepLogging:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-7"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_logging.handler
      Description: Step with context logger
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepAndWaitReplay:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-8"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_and_wait_replay.handler
      Description: Step and wait with replay
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepReplaySkipsSucceeded:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-9"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_replay_skips_succeeded.handler
      Description: Replay skips succeeded step
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepReplayRethrowsFailed:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-10"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_replay_rethrows_failed.handler
      Description: Replay re-throws failed step
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepWithRetry:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["1-11"]
    Properties:
      CodeUri: lambda-build/
      Handler: step.step_with_retry.handler
      Description: Step with retry (fails then succeeds)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
  StepRetryExhaustion:
