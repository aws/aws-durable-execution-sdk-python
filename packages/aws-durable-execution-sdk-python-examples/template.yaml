      "Type": "AWS::Serverless::Function",
      "Properties": {
        "CodeUri": ".aws-sam/source",
        "Handler": "hello_world.handler",
        "Description": "A simple hello world example with no durable operations",
        "Role": {
          "Fn::GetAtt": [
            "DurableFunctionRole",
            "Arn"
          ]
        },
        "KmsKeyArn": {
          "Fn::If": [
            "HasKmsKeyArn",
            {
              "Ref": "KmsKeyArn"
            },
            {
              "Ref": "AWS::NoValue"
            }
          ]
        },
        "DurableConfig": {
          "RetentionPeriodInDays": 7,
          "ExecutionTimeout": 300
        }
      }
    },
