{
  "AWSTemplateFormatVersion": "2010-09-09",
  "Transform": "AWS::Serverless-2016-10-31",
  "Globals": {
    "Function": {
      "Runtime": "python3.13",
      "Timeout": 60,
      "MemorySize": 128,
      "Environment": {
        "Variables": {
          "AWS_ENDPOINT_URL_LAMBDA": {
            "Ref": "LambdaEndpoint"
          }
        }
      }
    }
  },
  "Parameters": {
    "LambdaEndpoint": {
      "Type": "String",
      "Default": "https://lambda.us-west-2.amazonaws.com"
    },
    "KmsKeyArn": {
      "Type": "String",
      "Default": ""
    }
  },
  "Conditions": {
    "HasKmsKeyArn": {
      "Fn::Not": [
        {
          "Fn::Equals": [
            {
              "Ref": "KmsKeyArn"
            },
            ""
          ]
        }
      ]
    }
  },
  "Resources": {
    "DurableFunctionRole": {
      "Type": "AWS::IAM::Role",
      "Properties": {
        "AssumeRolePolicyDocument": {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Principal": {
                "Service": "lambda.amazonaws.com"
              },
              "Action": "sts:AssumeRole"
            }
          ]
        },
        "ManagedPolicyArns": [
          "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicDurableExecutionRolePolicy"
        ],
        "Policies": [
          {
            "PolicyName": "DurableExecutionExamplesKmsPolicy",
            "PolicyDocument": {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Action": [
                    "kms:CreateGrant",
                    "kms:Decrypt",
                    "kms:Encrypt"
                  ],
                  "Resource": "*"
                }
              ]
            }
          }
        ]
      }
    },
